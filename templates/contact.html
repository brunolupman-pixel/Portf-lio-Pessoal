{% extends 'base.html' %}
{% block content %}
<div class="contact-container">
    <h1>Contato</h1>
    {% if submitted %}
        <div class="toast-success">Sua mensagem foi enviada. Obrigado!</div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Enviar</button>
    </form>
</div>
{% endblock %}
