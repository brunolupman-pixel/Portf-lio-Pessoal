{% extends 'base.html' %}
{% block content %}
<h1>Todos os Projetos</h1>
<ul>
    {% for p in projects %}
        <li>{{ p.title }}{% if p.image %} - <img src="{{ p.image.url }}" width="30"/>{% endif %}</li>
    {% empty %}
        <li>Sem projetos cadastrados.</li>
    {% endfor %}
</ul>
{% endblock %}
