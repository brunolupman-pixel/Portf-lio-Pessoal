{% extends 'base.html' %}
{% block content %}
<h1>Formação Acadêmica</h1>
<div class="timeline">
    {% for f in formations %}
        <div class="timeline-item">
            <div class="timeline-title">{{ f.course }}</div>
            <div class="timeline-inst">{{ f.institution }}</div>
            <div class="timeline-dates">{{ f.start_date }} até {{ f.end_date|default:'presente' }}</div>
            {% if f.description %}
                <div class="timeline-desc">{{ f.description }}</div>
            {% endif %}
        </div>
    {% empty %}
        <div class="timeline-item">Sem registros.</div>
    {% endfor %}
</div>
{% endblock %}
