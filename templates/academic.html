{% extends 'base.html' %}
{% block content %}
<h1>Formação Acadêmica</h1>
<ul>
    {% for f in formations %}
        <li>{{ f.course }} - {{ f.institution }} ({{ f.start_date }} to {{ f.end_date|default:'presente' }})</li>
    {% empty %}
        <li>Sem registros.</li>
    {% endfor %}
</ul>
{% endblock %}
